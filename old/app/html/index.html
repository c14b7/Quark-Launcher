<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quark Launcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-sidebar">
            <input type="text" placeholder="Search...">
            <ul class="menu">
                <li><i class="icon-home"></i> Strona główna</li>
                <li><i class="icon-clips"></i> Klipy</li>
                <li><i class="icon-commands"></i> Komendy <span class="coming-soon">Coming soon</span></li>
                <li><i class="icon-account"></i> Połączone konto</li>
                <li><i class="icon-home"></i> Strona główna</li>
            </ul>
            <div class="placeholder large"></div>
            <div class="games-section">
                <h2>Twoje gry:</h2>
                <ul class="games-list">
                    <li>Game 1</li>
                    <li>Game 2</li>
                    <li>Game 3</li>
                    <li>Game 4</li>
                    <li>Game 5</li>
                </ul>
            </div>
        </div>
        <div class="main-content">
            <div class="placeholder large"></div>
            <div class="placeholder large"></div>
            <div class="placeholder large"></div>
            <div class="placeholder large"></div>
            <div class="grid">
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
                <div class="placeholder small"></div>
            </div>
        </div>
        <div class="right-sidebar">
            <div class="user-profile">
                <div class="username">Username</div>
                <div class="user-id">User ID</div>
            </div>
            <div class="placeholder medium"></div>
            <div class="friends-section">
                <h2>Friends:</h2>
                <ul class="friends-list">
                    <li>Friend 1 <span class="status">Online</span></li>
                    <li>Friend 2 <span class="status">Offline</span></li>
                    <li>Friend 3 <span class="status">Online</span></li>
                    <li>Friend 4 <span class="status">Offline</span></li>
                    <li>Friend 5 <span class="status">Online</span></li>
                </ul>
            </div>
        </div>
        <div class="bottom-left-corner">
            <button class="pro-button">PRO</button>
            <i class="icon-settings"></i>
        </div>
    </div>
</body>
</html>
