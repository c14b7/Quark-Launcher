<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 200px;
      height: 60px;
      background: transparent;
      overflow: hidden;
    }
    .quark-splash-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #d4ff00;
      letter-spacing: 0.04em;
      text-shadow: 0 0 24px rgba(212, 255, 0, 0.45);
      line-height: 60px;
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <div class="quark-splash-title">Quark</div>
</body>
</html>
