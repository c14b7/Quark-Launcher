directories:
  output: dist
  buildResources: build
appId: com.quark.launcher
productName: Quark Launcher
publish:
  - provider: github
    owner: c14b7
    repo: Quark-Launcher
files:
  - filter:
      - main.js
      - dev-server.js
      - preload.js
      - overlay-manager.js
      - overlay.html
      - overlay.css
      - overlay-renderer.js
      - overlay-preload.js
      - overlay-performance.js
      - dev-app-update.yml
      - assets/**/*
      - package.json
extraResources:
  - from: ../web/act-l/out
    to: app
    filter:
      - '**/*'
win:
  target: nsis
  icon: assets/icon.ico
electronVersion: 33.4.11
