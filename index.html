<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quark Launcher</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">Quark Launcher</div>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
        </div>
        <ul class="menu">
            <li><img src="icons/home.png" alt="Home Icon"> Home</li>
            <li><img src="icons/clips.png" alt="Clips Icon"> Clips</li>
            <li><img src="icons/threads.png" alt="Threads Icon"> Threads</li>
            <li><img src="icons/accounts.png" alt="Accounts Icon"> Connected accounts</li>
            <li><img src="icons/store.png" alt="Store Icon"> Store</li>
        </ul>
        <div class="games-section">
            <h3>Your games:</h3>
            <ul class="games-list">
                <li>Counter-Strike 2</li>
                <li>Need For Speed Unbound</li>
                <li>Cyberpunk 2077</li>
                <li>Starfield</li>
                <li>Sons of the Forest</li>
                <li>Valorant</li>
                <li>Game title</li>
            </ul>
        </div>
        <div class="pro-section">
            <button class="pro-button">PRO</button>
            <button class="settings-button"><i class="fas fa-cog"></i></button>
        </div>
    </div>
    <div class="main-content">
        <div class="banners-container">
            <div class="game-banner large"><img src="l/baner/sons.webp" alt=""></div>
            <div class="game-banner large"><img src="l/baner/star.jpg" alt=""></div>
            <div class="game-banner large"><img src="l/baner/val.jpg" alt=""></div>
        </div>
        <div class="game-thumbnails">
            <div class="game-thumbnail"><img src="l/baner/cisy.jpg" alt="Cities"></div>
            <div class="game-thumbnail"><img src="l/baner/cyber.jpg" alt="Cyberpunk"></div>
            <div class="game-thumbnail"><img src="l/baner/sons.webp" alt="Sons of the Forest"></div>
            <div class="game-thumbnail"><img src="l/baner/star.jpg" alt="Starfield"></div>
            <div class="game-thumbnail"><img src="l/baner/val.jpg" alt="Valorant"></div>
            <div class="game-thumbnail"><img src="l/baner/rr.jpg" alt="Rail Route"></div>
            <div class="game-thumbnail"><img src="l/baner/cs2.jpg" alt="Counter-Strike"></div>
            <div class="game-thumbnail"><img src="l/baner/nfsu.jpg" alt="Unbound"></div>
            <div class="game-thumbnail"><img src="l/baner/metro.jpg" alt="Metro"></div>
            <div class="game-thumbnail"><img src="l/baner/pcbs.webp" alt="pcbs"></div>
        </div>
    </div>
</body>
</html>
