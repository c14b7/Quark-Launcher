    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const steamApiKey = '5FAF3AEC4951E85E8F93FDC2C6FFA0A4'; // Wstaw swój klucz API Steam
            const steamUserId = '1124194227'; // Wstaw swój Steam User ID
            const proxyUrl = 'https://api.allorigins.win/get?url='; // Serwer proxy obsługujący CORS

            fetch('steam_games.json')
                .then(response => response.json())
                .then(games => {
                    const gameThumbnailsContainer = document.querySelector('.game-thumbnails');
                    const bannersContainer = document.querySelector('.banners-container');
                    games.forEach((game, index) => {
                        const gameThumbnail = document.createElement('div');
                        gameThumbnail.classList.add('game-thumbnail');
                        gameThumbnail.innerHTML = `
                            <img src="http://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg" alt="${game.name}">
                            <div class="options">⋮</div>
                        `;
                        gameThumbnail.addEventListener('click', () => {
                            window.location.href = `steam://run/${game.appid}`;
                        });
                        gameThumbnailsContainer.appendChild(gameThumbnail);
                        console.log(game.appid);

                        // Dodaj banery tylko dla pierwszych trzech gier
                        if (index < 3) {
                            const gameBanner = document.createElement('div');
                            gameBanner.classList.add('game-banner', 'large');
                            gameBanner.innerHTML = `
                                <img src="http://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg" alt="${game.name}">
                                <div class="options">⋮</div>
                            `;
                            gameBanner.addEventListener('click', () => {
                                window.location.href = `steam://run/${game.appid}`;
                            });
                            bannersContainer.appendChild(gameBanner);
                        }
                    });
                })
                .catch(error => console.error('Error loading games:', error));
        });
    </script>
